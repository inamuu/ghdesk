name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            os: linux
            arch: amd64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - runner: macos-14
            os: darwin
            arch: amd64
            target: x86_64-apple-darwin
          - runner: macos-14
            os: darwin
            arch: arm64
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="ghdesk_${version}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ghdesk dist/ghdesk
          tar -C dist -czf "$archive" ghdesk
          shasum -a 256 "$archive" > "${archive}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghdesk-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ghdesk_*.tar.gz
            ghdesk_*.tar.gz.sha256

  release:
    name: publish-release
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" release-artifacts/*.tar.gz release-artifacts/*.tar.gz.sha256 --clobber

  update-homebrew-tap:
    name: update-homebrew-tap
    runs-on: ubuntu-24.04
    needs: release
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Checkout homebrew-tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/inamuu/homebrew-tap.git" homebrew-tap

      - name: Update Formula
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          repo="https://github.com/inamuu/ghdesk"
          darwin_amd64_sha="$(cut -d' ' -f1 release-artifacts/ghdesk_${version}_darwin_amd64.tar.gz.sha256)"
          darwin_arm64_sha="$(cut -d' ' -f1 release-artifacts/ghdesk_${version}_darwin_arm64.tar.gz.sha256)"
          linux_amd64_sha="$(cut -d' ' -f1 release-artifacts/ghdesk_${version}_linux_amd64.tar.gz.sha256)"
          linux_arm64_sha="$(cut -d' ' -f1 release-artifacts/ghdesk_${version}_linux_arm64.tar.gz.sha256)"

          cat > homebrew-tap/Formula/ghdesk.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # This file was generated by GitHub Actions. DO NOT EDIT.
          class Ghdesk < Formula
            desc "Fullscreen GitHub TUI for your PRs and issues with preview support"
            homepage "${repo}"
            version "${version}"

            on_macos do
              if Hardware::CPU.intel?
                url "${repo}/releases/download/v${version}/ghdesk_${version}_darwin_amd64.tar.gz"
                sha256 "${darwin_amd64_sha}"

                def install
                  bin.install "ghdesk"
                end
              end
              if Hardware::CPU.arm?
                url "${repo}/releases/download/v${version}/ghdesk_${version}_darwin_arm64.tar.gz"
                sha256 "${darwin_arm64_sha}"

                def install
                  bin.install "ghdesk"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "${repo}/releases/download/v${version}/ghdesk_${version}_linux_amd64.tar.gz"
                sha256 "${linux_amd64_sha}"

                def install
                  bin.install "ghdesk"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "${repo}/releases/download/v${version}/ghdesk_${version}_linux_arm64.tar.gz"
                sha256 "${linux_arm64_sha}"

                def install
                  bin.install "ghdesk"
                end
              end
            end

            test do
              system "#{bin}/ghdesk", "--version"
            end
          end
          EOF

      - name: Commit and push Formula
        shell: bash
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/ghdesk.rb
          git diff --cached --quiet && exit 0
          git commit -m "ghdesk: update to ${GITHUB_REF_NAME#v}"
          git push origin main
